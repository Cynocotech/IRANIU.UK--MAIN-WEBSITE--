    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        @font-face { font-family: 'Yekan Bakh'; src: url('fonts/YekanBakh-Regular.woff') format('woff'); }
        :root { --brand-purple: #74208b; --dark-purple: #3a0b47; --accent-bg: #f3e8f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Yekan Bakh', Tahoma, sans-serif; }
        body { background-color: #fdfdfd; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        header { position: fixed; top: 0; right: 0; left: 0; background: var(--dark-purple); padding: 12px 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .logo img { height: 45px; }
        .thank-you-card { background: white; padding: 60px 40px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center; max-width: 500px; border: 1px solid #eee; }
        .thank-you-icon { width: 80px; height: 80px; background: var(--accent-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 2.5rem; color: var(--brand-purple); }
        .thank-you-card h1 { color: var(--dark-purple); font-size: 1.8rem; margin-bottom: 15px; }
        .thank-you-card p { color: #555; line-height: 1.8; margin-bottom: 25px; }
        .thank-you-card p.lead { font-size: 1.1rem; color: var(--dark-purple); font-weight: bold; }
        .btn-back { display: inline-block; background: var(--brand-purple); color: white; padding: 14px 35px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { background: var(--dark-purple); transform: translateY(-2px); }
    </style>
</head>
