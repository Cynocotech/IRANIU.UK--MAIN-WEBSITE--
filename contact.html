        .red-dot { width: 8px; height: 8px; background-color: var(--live-red); border-radius: 50%; box-shadow: 0 0 8px var(--live-red); animation: pulse-red 1.5s infinite; }

        /* --- Page Hero & Content --- */
        .page-hero { background: linear-gradient(135deg, var(--dark-purple), var(--brand-purple)); color: white; padding: 60px 20px; text-align: center; }
        .container { max-width: 800px; margin: -40px auto 100px; padding: 0 20px; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid #eee; }

        /* Form Elements */
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--dark-purple); }
        input, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #eee; background: #fafafa; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--brand-purple); background: white; }

        .submit-btn {
            width: 100%; background: var(--brand-purple); color: white; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer;
            font-size: 1rem; transition: 0.3s;
        }
        .submit-btn:hover { background: var(--dark-purple); transform: translateY(-2px); }
        #form-status { margin-top: 15px; text-align: center; font-weight: bold; }

        /* --- Footer --- */

        .social-links { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }

<script>
    window.addEventListener('load', () => {
        document.getElementById('page-loader').classList.add('fade-out');
        const params = new URLSearchParams(location.search);
        const err = params.get('error');
        const errMap = { missing: 'لطفاً تمام فیلدها را پر کنید.', config: 'تنظیمات ایمیل یافت نشد. با مدیر تماس بگیرید.', send: 'خطا در ارسال پیام. لطفاً دوباره تلاش کنید یا به hello@iraniu.uk ایمیل بزنید.', captcha: 'لطفاً تیک امنیتی (صفحه‌نمایش ربات) را تکمیل کنید.' };
        if (err && errMap[err]) {
            const el = document.getElementById('error-msg');
            el.textContent = errMap[err];
            el.style.display = 'block';
        }
    });

    function toggleMenu() { document.getElementById("mobileNav").classList.toggle("active"); }

    const form = document.getElementById("contact-form");
    form.addEventListener("submit", async function(e) {
        e.preventDefault();
        const status = document.getElementById("form-status");
        const btn = document.getElementById("submit-btn");
        const token = document.querySelector('[name="cf-turnstile-response"]')?.value?.trim();
        if (!token) {
            status.textContent = "لطفاً تیک امنیتی را تکمیل کنید.";
            status.style.color = "red";
            return;
        }
        const data = new FormData(e.target);

        btn.textContent = "در حال ارسال...";
        btn.disabled = true;

        fetch(e.target.action, {
            method: 'POST',
            body: data,
            headers: { 'Accept': 'application/json' }
        }).then(response => {
            if (!response.ok) throw new Error('Server error');
            return response.json();
        }).then(json => {
            if (json.success) {
                window.location.href = 'thank-you.html';
                return;
            }
            const errMap = { missing: 'لطفاً تمام فیلدها را پر کنید.', config: 'تنظیمات ایمیل یافت نشد. با مدیر تماس بگیرید.', send: 'خطا در ارسال پیام. لطفاً دوباره تلاش کنید یا به hello@iraniu.uk ایمیل بزنید.', captcha: 'لطفاً تیک امنیتی (صفحه‌نمایش ربات) را تکمیل کنید.', method: 'درخواست نامعتبر است.', setup: 'خطای نصب: composer install را اجرا کنید.' };
            const safeErr = (typeof json.error === 'string' && /^[a-z]+$/.test(json.error)) ? json.error : null;
            status.textContent = (safeErr && errMap[safeErr]) ? errMap[safeErr] : "خطایی رخ داد.";
            status.style.color = "red";
        }).catch(() => {
            status.textContent = "خطا در اتصال.";
            status.style.color = "red";
        }).finally(() => {
            btn.textContent = "ارسال پیام";
            btn.disabled = false;
        });
    });

    const radioUrl = 'https://panel.iraniu.uk/hls/iraniu_radio_/live.m3u8';
    const audio = document.getElementById('audio-stream');
    const playIcon = document.getElementById('play-icon');
    let hls;

    function toggleRadio() {
        if (!hls && Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(radioUrl);
            hls.attachMedia(audio);
        }
        if (audio.paused) { audio.play(); playIcon.className = 'fa-solid fa-pause'; }
        else { audio.pause(); playIcon.className = 'fa-solid fa-play'; }
    }
</script>
